name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.20'
          otp-version: '29'

      - name: Restore dependency cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-deps-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-deps-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-build-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-build-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: No-comments checker
        run: mix nyanform.no_comments

      - name: Credo strict
        run: mix credo --strict

      - name: Tests
        run: mix test

      - name: Property tests
        run: mix test --include property:true

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.20'
          otp-version: '29'

      - name: Restore dependency cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-deps-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-deps-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-build-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-build-

      - name: Restore PLT cache
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-plt-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Dialyzer
        run: mix dialyzer

  escript:
    name: Escript build and smoke test
    runs-on: ubuntu-latest
    needs: [quality, dialyzer]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.20'
          otp-version: '29'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore dependency cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-deps-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-deps-

      - name: Install dependencies
        run: mix deps.get

      - name: Build escript
        run: mix escript.build

      - name: Verify CLI
        run: ./nyanform --help

      - name: Run inspect
        run: ./nyanform inspect --stdio-command node --stdio-arg test/fixtures/mcp_server.js --format json

      - name: Run stdio proxy smoke test
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-11-25","capabilities":{},"clientInfo":{"name":"smoke","version":"1.0"}}}' | \
            ./nyanform serve --stdio-command node --stdio-arg test/fixtures/mcp_server.js --profile canonical 2>/dev/null

      - name: Package escript artifact
        run: |
          test -x nyanform
          tar -czf nyanform-linux.tar.gz nyanform

      - name: Upload escript artifact
        uses: actions/upload-artifact@v4
        with:
          name: nyanform-linux
          path: nyanform-linux.tar.gz
          retention-days: 7

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: nyanform:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: docker run --rm nyanform:ci --help
